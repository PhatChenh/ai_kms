ollama:
  base_url: http://localhost:11434
  chat_model: qwen3.5:9b
  synthesis_model: qwen3.5:9b   # replace with larger model e.g. qwen3.5:32b
  delay_between_calls: 2
  embedding_model: nomic-embed-text
  timeout: 120
