capture:
  cooldown_seconds: 60 # original: 60, change for testing
  max_urls_per_note: 3
  rename_gate:
    office_extensions: [".md", ".docx", ".xlsx", ".pptx", ".txt"]
    max_stem_length: 120
  folder_cooldown_seconds: 5.0
  binary_settle_seconds: 5.0
  folder_max_workers: 4
claude:
  max_tokens: 1024
  model: claude-haiku-4-5-20251001
  synthesis_model: claude-sonnet-4-20250514
  embedding_model: voyage-3
  timeout: 60
claude_cli:
  cli_path: claude
  model: claude-haiku-4-5-20251001
  synthesis_model: claude-sonnet-4-20250514
  embedding_model: voyage-3
  max_tokens: 1024
  timeout: 60
database:
  path: ./data/kb.db
handlers:
  max_file_size_bytes: 52428800       # 50 MB — PDF/DOCX hard cap
  max_web_fetch_bytes: 10485760       # 10 MB — web body hard cap
  web_fetch_timeout_seconds: 30
  dns_resolve_timeout_seconds: 5
  max_redirects: 5
logging:
  console: true
  file: logs/app.log
  level: INFO
mcp:
  enable_http: false
  host: 0.0.0.0
  port: 3838
  context_injection:
    max_entities_per_dimension: 15
    max_orientation_facts_per_dimension: 5
  retrieval_score:
    decay_factor: 0.95
    sweep_interval_hours: 24
  inspect:
    max_text_refs: 5
  fact_search:
    keyword_weight: 0.5
    max_results: 20
openai_compat:
  api_key_env: LLM_API_KEY
  base_url: https://maas-llm-aiplatform-hcm.api.vngcloud.vn/v1
  max_tokens: 1024
  model: deepseek/deepseek-v4-pro
  synthesis_model: deepseek/deepseek-v4-pro
  embedding_model: greennode/greennode-embedding-large-1007
  timeout: 60
ollama:
  base_url: http://localhost:11434
  chat_model: llama3
  synthesis_model: llama3   # replace with larger model e.g. llama3
  max_tokens: 1024
  delay_between_calls: 2
  embedding_model: nomic-embed-text
  timeout: 120
para_context_path: /Users/phatchenh/Library/Mobile Documents/iCloud~md~obsidian/Documents/Claude
  Brain/para-context.yaml
providers:
  capture: openai # originally claude, changed to use Fireworks via openai provider
  classify: openai
  embeddings: openai
  self_learn: openai
  synthesis: openai
self_learning:
  confidence_threshold: 0.8
  enabled: true
  include_examples_in_prompt: true
  max_examples: 5
  min_evaluations: 20
search:
  embedding_model: "all-MiniLM-L6-v2"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_candidates: 20
  max_results: 10
env: prod   # dev | prod = use vault.root | test = use testing.vault_path below
testing:
  vault_path: /tmp/ai_kms_test_vault  # isolated vault for manual testing guide runs — never the real vault
vault:
  archive_dir: Archive
  briefings_dir: Briefings
  documentation_dir: Documentation
  domain_dir: Domain
  inbox_dir: inbox
  projects_dir: Projects
  root: /Users/phatchenh/ai_kms_test_vault/actual_test_vault
  synthesis_dir: Synthesis
  no_edit_extensions: [".pdf", ".png", ".jpg", ".jpeg", ".gif", ".webp"]