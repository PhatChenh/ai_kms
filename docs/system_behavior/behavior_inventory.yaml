# Behavior Inventory — AI-KMS
# Living file. Edited in place, never recreated. Holds irreplaceable human state.
# Last seeded: 2026-06-04 from current code + design docs.
#
# Schema per entry:
#   id:             unique slug (phase prefix + number)
#   behavior:       one-line description of observable outcome
#   tier:           smoke | phase | full
#   phase:          originating phase number or name
#   trigger:        CLI command or event that fires this behavior
#   fixtures:       list of files the setup script must create
#   steps:          what the tester does (plain English)
#   expected:       what must be true after (vault-visible for smoke/phase, DB/log for full)
#   spec_ref:       roadmap/spec clause or "NONE -- needs human"
#   human_reviewed: yes | no
#   pytest_ref:     test function path or null
#   status:         active | planned | retired
#   retired:        null or "<date>: <reason>"

