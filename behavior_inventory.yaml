- id: P9-MCP-01
  description: "kms_vault_info returns a structural overview of all known entities grouped by dimension, plus per-dimension orientation fact bullets, without reading any vault disk files or CLAUDE.md"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-02
  description: "kms_search returns query facts from the knowledge_entries fact hybrid index plus structured summaries of top-K source documents from the documents table, merged and identity-deduped, with orientation facts prepended"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-03
  description: "kms_search returns document summary results for freshly-captured documents that have not yet been classified (dual-corpus recall safety-net)"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-04
  description: "kms_inspect accepts batched integer document ids and a uniform mode per call (summary, text, or file), defaulting to summary, and returns the requested tier from the database"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-05
  description: "kms_inspect text mode degrades gracefully to summary with a note when documents.full_body is NULL"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-06
  description: "kms_write sends consumer-provided content through the cloud capture pipeline (5-section summary + classify), creates a new document with source_type=chat_session, and returns the new document id"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-07
  description: "kms_correct patches an existing knowledge_entries row by id — supporting edit fact, change tag, change entity, promote (pending to confident), and retire (with required reason) — and logs every mutation to audit_log with pipeline=correct"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-08
  description: "kms_correct returns a clear Failure when given a nonexistent entry id"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-09
  description: "Context injection engine assembles fact bullets from knowledge_entries ranked by trust_score DESC, retrieval_score DESC, confidence DESC, updated_at DESC, budget-capped per dimension, with zero CLAUDE.md or vault disk reads"
  origin: design
  granularity: outcome
  status: pending

- id: P9-MCP-10
  description: "Conversation-level identity dedup prevents the same orientation fact (by row id) from being re-injected in the same conversation"
