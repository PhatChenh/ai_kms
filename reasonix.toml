# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "allow"
deny = ["Bash(rm -rf*)", "Bash(git push --force*)", "Bash(git reset --hard*)"]
allow = ["Bash(git status:*)", "Bash(git diff:*)", "Bash(git log:*)", "Bash(git branch:*)", "Bash(git show:*)", "Bash(git stash:*)", "Bash(git worktree:*)", "Bash(git rev-parse:*)", "Bash(git check-ignore:*)", "Bash(grep:*)", "Bash(find:*)", "Bash(ls:*)", "Bash(cat:*)", "Bash(head:*)", "Bash(tail:*)", "Bash(wc:*)", "Bash(echo:*)", "Bash(which:*)", "Bash(type:*)", "Bash(file:*)", "Bash(python3:*)", "Bash(uv run ruff check:*)", "Bash(uv run pytest:*)", "Bash(uv run python:*)", "Bash(uv sync:*)", "Bash(curl:*)", "Bash(jq:*)", "Bash(sort:*)", "Bash(uniq:*)", "Bash(awk:*)", "Bash(sed:*)", "Bash(xargs:*)", "Bash(base64:*)", "task", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_core/test_vault_root_env.py -q --tb=short 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_core/ -q --tb=short 2>&1 | tail -5)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && git diff HEAD -- src/core/config.py 2>&1 | head -40)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/test_api.py -q --tb=short 2>&1 && echo \"---\" && git diff --stat src/mcp_server/tools.py)", "Edit", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/test_api.py -q --tb=short 2>&1 && uv run ruff check src/mcp_server/api.py 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/ -q --tb=short 2>&1 | tail -10)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/ tests/test_storage/ tests/test_core/ -q --tb=short 2>&1 | tail -10)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/ -q --tb=long 2>&1 | tail -20)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run ruff check src/mcp_server/cloud_entry.py 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_build/test_dependencies.py -q --tb=short 2>&1 && uv run python -c \"import uvicorn; print(uvicorn.__version__)\" 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && ls -la scripts/start.sh Dockerfile litestream.yml && echo \"---\" && bash -n scripts/start.sh && echo \"Syntax OK\" && echo \"---\" && docker --version 2>&1 || echo \"No Docker\")", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && docker build --platform linux/amd64 -t ai-kms-p5-slice2 . 2>&1 | tail -30)", "Bash(open -a Docker 2>&1; sleep 5; docker info 2>&1 | head -5)", "Bash(sleep 10 && docker info 2>&1 | head -3)", "Bash(docker ps 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && docker build --platform linux/amd64 -t ai-kms-p5-slice2 . 2>&1 | tail -20)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && DOCKER_BUILDKIT=0 docker build --platform linux/amd64 -t ai-kms-p5-slice2 . 2>&1 | tail -30)", "Bash(ls -la /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy/README.md 2>&1)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && uv run pytest tests/test_mcp_server/ tests/test_storage/ tests/test_core/ tests/test_build/ -q --tb=short 2>&1 | tail -15)", "Bash(docker run --platform linux/amd64 -d -p 8080:8080 -e KMS_DAEMON_API_KEY=test-key-123 -e env=prod --name ai-kms-test ai-kms-p5-slice2 2>&1)", "Bash(sleep 5 && curl -s localhost:8080/health && echo \"\" && docker logs ai-kms-test 2>&1 | head -20)", "Bash(docker logs ai-kms-test 2>&1 | tail -30)", "Bash(docker rm -f ai-kms-test 2>/dev/null; cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && DOCKER_BUILDKIT=0 docker build --platform linux/amd64 -t ai-kms-p5-slice2 . 2>&1 | tail -5)", "Bash(docker run --platform linux/amd64 -d -p 8080:8080 -e KMS_DAEMON_API_KEY=test-key-123 -e env=prod --name ai-kms-test ai-kms-p5-slice2 2>&1 && sleep 5 && curl -s localhost:8080/health)", "Bash(docker logs ai-kms-test 2>&1 | tail -20)", "Bash(docker rm -f ai-kms-test 2>/dev/null; docker run --platform linux/amd64 -d -p 8080:8080 -e KMS_DAEMON_API_KEY=test-key-123 -e VAULT_ROOT=/data/vault -e env=prod --name ai-kms-test ai-kms-p5-slice2 2>&1 && sleep 5 && curl -s localhost:8080/health)", "Bash(grep \"vault.root\" /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy/config/config.yaml 2>/dev/null || grep \"vault\" /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy/config/config.yaml)", "Bash(docker run --platform linux/amd64 -d -p 8080:8080 \\\n  -e KMS_DAEMON_API_KEY=test-key-123 \\\n  -e VAULT_ROOT=/data/vault \\\n  -e KMS_DB_PATH=/data/kb.db \\\n  --name ai-kms-test ai-kms-p5-slice2 2>&1 && sleep 8 && curl -s localhost:8080/health)", "Bash(cd /Users/phatchenh/ai_kms/.worktrees/p5-slice2-deploy && GIT_DIR=$(git rev-parse --git-dir) GIT_COMMON=$(git rev-parse --git-common-dir) && echo \"GIT_DIR=$GIT_DIR\" && echo \"GIT_COMMON=$GIT_COMMON\" && echo \"BRANCH=$(git branch --show-current)\" && git merge-base HEAD main 2>/dev/null && echo \"---\" && git log --oneline HEAD -5)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

