capture:
  cooldown_seconds: 0 # original: 60, change for testing
  max_urls_per_note: 3
  rename_gate:
    office_extensions: [".md", ".docx", ".xlsx", ".pptx", ".txt"]
    max_stem_length: 120
  folder_cooldown_seconds: 5.0
  binary_settle_seconds: 5.0
  folder_max_workers: 4
claude:
  max_tokens: 1024
  model: claude-haiku-4-5-20251001
  synthesis_model: claude-sonnet-4-20250514
  embedding_model: voyage-3
  timeout: 60
claude_cli:
  cli_path: claude
  model: claude-haiku-4-5-20251001
  synthesis_model: claude-sonnet-4-20250514
  embedding_model: voyage-3
  max_tokens: 1024
  timeout: 60
database:
  path: ./data/kb.db
env: dev
handlers:
  max_file_size_bytes: 52428800       # 50 MB — PDF/DOCX hard cap
  max_web_fetch_bytes: 10485760       # 10 MB — web body hard cap
  web_fetch_timeout_seconds: 30
  dns_resolve_timeout_seconds: 5
  max_redirects: 5
logging:
  console: true
  file: logs/app.log
  level: INFO
mcp:
  enable_http: false
  host: 0.0.0.0
  port: 3838
openai_compat:
  api_key_env: FIREWORKS_API_KEY
  base_url: https://api.fireworks.ai/inference/v1
  max_tokens: 1024
  model: accounts/fireworks/models/gpt-oss-20b
  synthesis_model: accounts/fireworks/models/llama-v3p1-70b-instruct
  embedding_model: nomic-ai/nomic-embed-text-v1.5
  timeout: 60
ollama:
  base_url: http://localhost:11434
  chat_model: llama3
  synthesis_model: llama3   # replace with larger model e.g. llama3
  max_tokens: 1024
  delay_between_calls: 2
  embedding_model: nomic-embed-text
  timeout: 120
para_context_path: /Users/phatchenh/Library/Mobile Documents/iCloud~md~obsidian/Documents/Claude
  Brain/para-context.yaml
providers:
  capture: claude_cli # originally claude, changed to use Fireworks via openai_compat provider
  classify: claude
  embeddings: ollama
  self_learn: claude
  synthesis: claude
self_learning:
  confidence_threshold: 0.8
  enabled: true
  include_examples_in_prompt: true
  max_examples: 5
  min_evaluations: 20
testing:
  vault_path: /Users/lap14806/ai_kms_test_vault/actual_test_vault  # isolated vault for manual testing guide runs — never the real vault
vault:
  archive_dir: Archive
  briefings_dir: Briefings
  documentation_dir: Documentation
  domain_dir: Domain
  inbox_dir: inbox
  projects_dir: Projects
  root: /Users/lap14806/ai_kms_test_vault/actual_test_vault
  synthesis_dir: Synthesis
  no_edit_extensions: [".pdf", ".png", ".jpg", ".jpeg", ".gif", ".webp"]