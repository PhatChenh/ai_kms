report_types:
  correction_summary:
    title: "Correction Summary"
    prompt: |
      Analyze the following correction data and produce a concise report covering:
      - Total corrections by type (confirm, reject, revise)
      - Most-corrected entities
      - Accuracy trend (are corrections decreasing over time?)
      Provide specific numbers and actionable insights.
    sources: [corrections]
    filters: {}

  knowledge_health:
    title: "Knowledge Health Report"
    prompt: |
      Analyze the following knowledge base data and produce a health report covering:
      - Total facts by dimension
      - Count of pending vs confident vs retired entries
      - Coverage metrics (dimensions with few facts)
      - Overall knowledge base quality assessment
    sources: [facts]
    filters: {}

  volatile_entries:
    title: "Volatile Entries Report"
    prompt: |
      Analyze the following entries that have been corrected multiple times.
      For each volatile entry, explain:
      - How many times it was corrected and why
      - Whether the current value seems stable
      - Whether the entry should be reviewed by a human
    sources: [corrections, facts]
    filters: {}

  coverage_gaps:
    title: "Coverage Gaps Report"
    prompt: |
      Analyze the following data about documents and extracted knowledge.
      Identify:
      - Documents with zero knowledge entries extracted
      - Dimensions with significantly fewer facts than others
      - Entities mentioned in documents but absent from the knowledge base
    sources: [facts, summaries]
    filters: {}

  conflicts:
    title: "Conflicts Report"
    prompt: |
      Analyze the following pairs of knowledge entries where conflicts exist
      (same entity + dimension + tag with both trusted and pending status).
      For each conflict:
      - Show both the trusted and pending versions
      - Explain the likely source of the conflict
      - Recommend which version to keep
    sources: [facts]
    filters: { detect_conflicts: true }

  meeting_insights:
    title: "Meeting Insights Report"
    prompt: |
      You are analyzing a manager's meeting notes and extracted knowledge facts.
      Produce a concise executive-level insight report covering:
      - Recurring themes and topics across meetings
      - Key decisions made and their status
      - Blockers and risks surfaced repeatedly
      - Patterns in who owns what (accountability map)
      - Any notable gaps or blind spots in the discussions
      Focus on actionable patterns, not just listing facts. Write for a busy executive.
    sources: [facts, summaries]
    filters: {}

  action_items:
    title: "Action Items Report"
    prompt: |
      You are analyzing meeting notes and knowledge entries to extract open action items.
      Produce a structured report:
      - List all action items you can identify, grouped by owner/person
      - For each item: what needs to be done, who is responsible, any deadline mentioned
      - Flag items that appear overdue or at risk based on context
      - Summarize total workload per person
      Write in a clear checklist-style format suitable for a follow-up email.
    sources: [facts, summaries]
    filters: {}

  weekly_digest:
    title: "Weekly Digest"
    prompt: |
      You are summarizing a manager's knowledge base to produce a weekly digest.
      Write a clear, narrative-style summary (3-5 paragraphs) covering:
      - What happened this week: key meetings, decisions, and progress
      - What is in motion: active projects and their current state
      - What needs attention: open questions, risks, and blocked items
      - People to follow up with and why
      Write in plain English, as if briefing the manager before their Monday morning.
    sources: [facts, summaries]
    filters: {}
